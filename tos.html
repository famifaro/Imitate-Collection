<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>利用規約 — Imitate Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#181818;--s1:#212121;--s2:#2a2a2a;--br:#3d3d3d;--br2:#505050;--ac:#1a6ee8;--ac2:#4d94ff;--tx:#f1f1f1;--tx2:#aaa;--tx3:#777;--ac-d:rgba(26,110,232,.15);}
body.theme-light{--bg:#f4f6fb;--bg2:#ffffff;--s1:#eef2f8;--s2:#e3e8f1;--br:#d7dde8;--br2:#bcc5d4;--ac:#1d4ed8;--ac2:#2563eb;--tx:#111827;--tx2:#4b5563;--tx3:#6b7280;--ac-d:rgba(37,99,235,.12);}
*,::before,::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP',sans-serif;line-height:1.85;min-height:100vh;}
a{color:var(--ac2);}
.hdr{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(15,15,15,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:300;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none;color:var(--tx);}
.logo-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.5px;overflow:hidden;flex-shrink:0;}
.logo-wrap{display:flex;flex-direction:column;line-height:1;}
.logo-name{font-size:13px;font-weight:700;white-space:nowrap;}
.logo-sub{font-size:9px;color:var(--tx3);font-family:'Space Mono',monospace;letter-spacing:.05em;white-space:nowrap;}
.hdr-spacer{flex:1;}
.hdr-right{display:flex;gap:6px;margin-left:auto;flex-shrink:0;align-items:center;}
.hbtn-nav{height:32px;padding:0 14px;border-radius:16px;font-size:12px;display:flex;align-items:center;gap:5px;transition:all .18s;border:1px solid transparent;color:var(--tx2);background:none;cursor:pointer;text-decoration:none;}
.hbtn-nav:hover{background:var(--s1);color:var(--tx);}
.hbtn-nav.active{background:var(--ac-d);border-color:var(--ac);color:var(--ac2);}
.wrap{max-width:740px;margin:0 auto;padding:94px 20px 80px;}
#tosBody h2{font-size:16px;font-weight:700;margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--br);}
#tosBody h3{font-size:14px;font-weight:600;margin:16px 0 6px;color:var(--tx2);}
#tosBody p{font-size:13px;color:var(--tx2);margin-bottom:8px;}
#tosBody li{font-size:13px;color:var(--tx2);margin-bottom:4px;}
#tosBody ul,#tosBody ol{padding-left:1.4em;margin-bottom:10px;}
footer{text-align:center;padding:24px 16px;border-top:1px solid var(--br);color:var(--tx3);font-size:12px;}
</style>
</head>
<body>
<header class="hdr">
  <a class="logo" href="index.html">
    <div class="logo-icon"><img src="icon_2023.png" style="width:100%;height:100%;object-fit:cover;border-radius:6px;" alt=""></div>
    <div class="logo-wrap">
      <span class="logo-name">Imitate Collection</span>
      <span class="logo-sub">Closed release ver.</span>
    </div>
  </a>
  <div class="hdr-spacer"></div>
  <div class="hdr-right">
    <a class="hbtn-nav" href="index.html">← メインページに戻る</a>
    <a class="hbtn-nav active" href="privacy.html">🔒 プライバシーポリシー</a>
  </div>
</header>
<div class="wrap">
  <div id="tosBody"></div>
</div>
<footer style="text-align:center;padding:28px 16px 20px;border-top:1px solid var(--br);margin-top:40px;color:var(--tx3);font-size:12px;">
  <div style="display:flex;justify-content:center;gap:24px;margin-bottom:10px;flex-wrap:wrap;">
    <a href="https://imicomweb.com/" target="_blank" style="color:var(--tx2);text-decoration:none;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--tx2)'">Imicomweb.com</a>
    <a href="https://www.youtube.com/@subeteanatanoseidesu" target="_blank" style="color:var(--tx2);text-decoration:none;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--tx2)'">全てあなたの所為です。</a>
    <a href="javascript:void(0)" onclick="document.getElementById('contactOverlay').classList.add('open')" style="color:var(--tx2);text-decoration:none;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--tx2)'">管理者へ連絡</a>
    <a href="tos.html" target="_blank" style="color:var(--tx2);text-decoration:none;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--tx2)'">利用規約</a>
    <a href="privacy.html" target="_blank" style="color:var(--tx2);text-decoration:none;" onmouseover="this.style.color='var(--tx)'" onmouseout="this.style.color='var(--tx2)'">プライバシーポリシー</a>
  </div>
  <div style="line-height:1.8;">
    このサイトは「全てあなたの所為です。」の二次創作であり、非公式です。<br>
    © 2020-Imitate Community / ©︎2026-Imitate Collection
  </div>
</footer>
<script>
const DEFAULT_TOS=`no data`;
function applyTheme(theme){
  document.body.classList.toggle('theme-light',theme==='light');
  localStorage.setItem('ic_theme',theme==='light'?'light':'dark');
}
applyTheme(localStorage.getItem('ic_theme')||'dark');
async function loadTosDoc(){
  try{
    const res=await fetch('/api/legal-doc?key=tos');
    const data=await res.json();
    if(res.ok&&data.ok!==false&&data.content){
      document.getElementById('tosBody').innerHTML=data.content;
      return;
    }
  }catch(e){}
  try{
    const s=localStorage.getItem('ic_tos');
    document.getElementById('tosBody').innerHTML=s||DEFAULT_TOS;
  }catch(e){document.getElementById('tosBody').innerHTML=DEFAULT_TOS;}
}
async function syncThemeFromAuth(){
  try{
    const res=await fetch('/api/auth/me');
    const data=await res.json();
    if(res.ok&&data.user?.theme) applyTheme(data.user.theme);
    if(res.ok&&data.user){
      try{
        await fetch('/api/access-log',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({path:'/tos.html'}),
        });
      }catch(e){}
    }
  }catch(e){}
}
loadTosDoc();
syncThemeFromAuth();
</script>
</body>
</html>
